<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 멋진 사이트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* 들어가자마자 화면을 꽉 채울 GIF 배경 */
        .background-gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('background.gif') no-repeat center center;
            background-size: cover;
        }
    </style>
</head>
<body>

    <audio id="myAudio" src="music.mp3" autoplay loop preload="auto"></audio>

    <div class="background-gif"></div>

    <script>
        // 혹시나 브라우저가 자동재생을 막았을 때를 대비해, 
        // 사용자가 화면 어디든 '한 번만 까딱 클릭'해도 바로 소리가 터져 나오게 만드는 안전장치 코드
        window.addEventListener('click', function() {
            var audio = document.getElementById('myAudio');
            audio.play();
        }, { once: true });
    </script>
</body>
</html>
